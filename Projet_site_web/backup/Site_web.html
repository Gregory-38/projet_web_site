<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Projet site web</title>
    <link href="./style.css" rel="stylesheet">
    <link href="./icomoon.css" rel="stylesheet">
    <script src="./fonction.js"></script>
</head>

<body>

    <div class="lead">
        <div>
            <img src="./logo_site_web.png" class="logo" />
        </div>

        <div class="space">
            <a class="button">Produits</a>
            <a class="button">Contact</a>
            <a class="button">A propos</a>
        </div>

        <div style="display: flex;">
            <a class="button icon-user">Compte</a>
            <a class="button icon-cart">Panier</a>
        </div>
    </div>

    <div class="column">
        <div style="width:100%; position: relative;">
            <div onclick="sliderLeft()" class="control-carousel control-left">
                <div class="icon-arrow-left"></div>
            </div>
            <div id="c" class="carousel">

                <div class="slide">
                    <img src="./folder_picture/picture_1.png" />
                </div>
                <div class="slide">
                    <img src="./folder_picture/picture_2.png" />
                </div>
                <div class="slide">
                    <img src="./folder_picture/picture_3.png" />
                </div>
                <div class="slide">
                    <img src="./folder_picture/picture_4.png" />
                </div>

            </div>
            <div class="control-carousel control-right">
                <div onclick="sliderRight()" class="icon-arrow-right"></div>
            </div>
        </div>

        <div class="item">
            <div class="sell">article 1 </div>
            <div class="sell">article 2 </div>
            <div class="sell">article 3 </div>




        </div>

    </div>






























</body>

</html>
